{% extends "layout.html" %}
{% block content %}

<style>

    :root { --inventario-accent: #2ecc71; }
    .panel-title { border-left: 5px solid var(--inventario-accent); padding-left: 10px; font-weight: 700; }
    .table-responsive { max-height: 65vh; overflow-y: auto; }
    .bg-soft-info { background-color: #e3f2fd; color: #0d47a1; }
    .kpi-box { transition: all 0.3s ease; border: 1px solid #eee; }
    .kpi-box:hover { border-color: var(--inventario-accent); background: #f8fff8; }
    .text-costo { color: #c0392b; font-weight: 600; }
    .text-pvp { color: #2e7d32; font-weight: 600; }
    .text-valor { color: #1a5fb4; font-weight: 700; }
    .text-empaque { color: #7f8c8d; font-weight: 500; }

    .inventario-tabs .nav-tabs { border-bottom: 3px solid #27ae60; background: #ffffff; }
    .inventario-tabs .nav-link {
        color: #333 !important; font-weight: 600; padding: 0.85rem 1.8rem;
        background: #f8f9fa; border: 1px solid #dee2e6; border-bottom: none; border-radius: 10px 10px 0 0;
    }
    .inventario-tabs .nav-link.active {
        background: var(--inventario-accent); color: white !important;
        border: 1px solid #27ae60; font-weight: 700;
    }
    .inventario-tabs .tab-content {
        background: white; border: 1px solid #dee2e6; border-top: none;
        border-radius: 0 0 10px 10px; padding: 1.5rem; min-height: 500px;
    }
    .chart-container { height: 520px; max-width: 1100px; margin: 0 auto; }
</style>

<div class="container-fluid py-3">
    <div class="row mb-4">
        <div class="col-12">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
                        <h4 class="mb-0"><i class="bi bi-box-seam me-2"></i>Inventario</h4>
                        <div class="d-flex gap-3 flex-wrap">
                            <select id="valorizar_a" class="form-select w-auto" onchange="cargarInv()">
                                <option value="costo">Costo</option>
                            </select>
                            <div class="input-group" style="min-width: 280px;">
                                <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                                <input type="text" id="inv_prod" class="form-control border-start-0" 
                                       placeholder="Descripción o código..." onkeyup="cargarInv()">
                            </div>
                        </div>
                    </div>
                    <div class="row g-3 justify-content-end">
                        <div class="col-md-3 col-sm-6"><div class="kpi-box text-center p-3"><small class="text-muted d-block">Stock Físico</small><h5 id="t_exi" class="fw-bold text-dark mb-0">0</h5></div></div>
                        <div class="col-md-3 col-sm-6"><div class="kpi-box text-center p-3"><small class="text-muted d-block">Artículos</small><h5 id="t_art" class="fw-bold mb-0">0</h5></div></div>
                        <div class="col-md-4 col-sm-6"><div class="kpi-box text-center p-3 border-primary"><small class="text-muted d-block">Valorización Total</small><h5 id="t_val" class="fw-bold text-primary mb-0">0,00</h5></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="inventario-tabs">
        <ul class="nav nav-tabs mb-0" id="inventarioTabs" role="tablist">
            <li class="nav-item"><button class="nav-link active" id="tabla-tab" data-bs-toggle="tab" data-bs-target="#tabla-pane" type="button" role="tab">Detalle de Existencias</button></li>
            <li class="nav-item"><button class="nav-link" id="grafico-tab" data-bs-toggle="tab" data-bs-target="#grafico-pane" type="button" role="tab">Gráfico por Marca</button></li>
        </ul>
        <div class="tab-content" id="inventarioTabContent">
            <div class="tab-pane fade show active p-3" id="tabla-pane" role="tabpanel">
                <div class="table-responsive">
                    <table class="table table-hover table-sm mb-0">
                        <thead class="table-light sticky-top">
                            <tr>
                                <th class="ps-3">CÓDIGO</th>
                                <th>DESCRIPCIÓN DEL ARTÍCULO</th>
                                <th>MARCA</th>
                                <th class="text-end">STOCK</th>
                                <th class="text-end text-costo">COSTO UNIT.</th>
                                <th class="text-end text-pvp" id="th-p1">PRECIO 1</th>
                                <th class="text-end text-pvp" id="th-p2">PRECIO 2</th>
                                <th class="text-end text-pvp" id="th-p3">PRECIO 3</th>
                                <th class="text-end text-empaque">TOTAL EMPAQUE</th>
                                <th class="text-end pe-3 text-valor fw-bold" id="th-valor-total">Valor Total</th>
                            </tr>
                        </thead>
                        <tbody id="tabla_inv"></tbody>
                    </table>
                </div>
            </div>
            <div class="tab-pane fade p-4" id="grafico-pane" role="tabpanel">
                <h5 class="panel-title mb-4" id="titulo-grafico">Gráfico por Marca</h5>
                <div class="chart-container"><canvas id="chartInvMarca"></canvas></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let instInv = {};
let nombresSincronizados = false;

async function cargarInv() {
    try {
        const busqueda = document.getElementById("inv_prod").value.trim();
        const valorizar_a = document.getElementById("valorizar_a").value;

        const r = await fetch("/api/inventario", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ producto: busqueda, valorizar_a })
        });
        
        const d = await r.json();
        const fmt = (n) => (n || 0).toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        // 1. SINCRONIZAR NOMBRES DESDE APP.PY (NOMBRES REALES DEL DBF)
        if (!nombresSincronizados && d.nombres_precios) {
            const select = document.getElementById("valorizar_a");
            
            // Actualizar Cabeceras de la Tabla
            document.getElementById("th-p1").textContent = d.nombres_precios["1"];
            document.getElementById("th-p2").textContent = d.nombres_precios["2"];
            document.getElementById("th-p3").textContent = d.nombres_precios["3"];

            // Actualizar Opciones del Select
            select.innerHTML = '<option value="costo">Costo</option>';
            ['1', '2', '3'].forEach(key => {
                const opt = document.createElement('option');
                opt.value = `precio${key}`;
                opt.textContent = d.nombres_precios[key];
                select.appendChild(opt);
            });
            nombresSincronizados = true;
        }

        // 2. ACTUALIZAR TÍTULOS DE VALORIZACIÓN
        const labelActual = document.getElementById("valorizar_a").options[document.getElementById("valorizar_a").selectedIndex].text;
        document.getElementById("th-valor-total").textContent = `Total (${labelActual})`;
        document.getElementById("titulo-grafico").textContent = `Gráfico por Marca (${labelActual})`;

        // 3. KPIs
        document.getElementById("t_val").innerText = fmt(d.totales.valor_total);
        document.getElementById("t_exi").innerText = (d.totales.existencia || 0).toLocaleString('es-VE');
        document.getElementById("t_art").innerText = (d.totales.articulos || 0).toLocaleString('es-VE');

        // 4. TABLA
        document.getElementById("tabla_inv").innerHTML = (d.tabla || []).map(i => `
            <tr>
                <td class="ps-3 small text-muted fw-bold">${i.CODIGO}</td>
                <td style="font-size: 0.85rem;" class="fw-medium">${i.DESCRIPCION}</td>
                <td><span class="badge bg-soft-info">${i.MARCA}</span></td>
                <td class="text-end fw-bold">${i.EXISTENCIA.toLocaleString('es-VE')}</td>
                <td class="text-end text-costo">${fmt(i.COSTO_UNITARIO)}</td>
                <td class="text-end text-pvp">${fmt(i.PRECIO1)}</td>
                <td class="text-end text-pvp">${fmt(i.PRECIO2)}</td>
                <td class="text-end text-pvp">${fmt(i.PRECIO3)}</td>
                <td class="text-end text-empaque">${fmt(i.TOTAL_EMPAQUE)}</td>
                <td class="text-end pe-3 text-valor fw-bold">${fmt(i.VALOR_TOTAL)}</td>
            </tr>
        `).join("");

        renderInvChart("chartInvMarca", d.marcas_chart?.map(x => x.MARCA), d.marcas_chart?.map(x => x.V));

    } catch (e) { console.error("Error:", e); }
}

function renderInvChart(id, labels, values) {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    if (instInv[id]) instInv[id].destroy();
    instInv[id] = new Chart(canvas.getContext('2d'), {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: ['#2ecc71', '#27ae60', '#1abc9c', '#16a085', '#3498db', '#2980b9', '#f1c40f', '#e67e22', '#e74c3c', '#9b59b6'],
                borderWidth: 2
            }]
        },
        options: { responsive: true, maintainAspectRatio: false, cutout: '60%' }
    });
}

document.addEventListener("DOMContentLoaded", cargarInv);
</script>

{% endblock %}
