{% extends "layout.html" %}
{% block content %}

<!-- Tom Select -->
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

<style>
    :root { --inventario-accent: #2ecc71; }
    body { background-color: #f5f7fa; }

    .panel-title {
        border-left: 5px solid var(--inventario-accent);
        padding-left: 10px; font-weight: 700; color: #2c3e50;
    }

    .table-responsive {
        max-height: 65vh; overflow-y: auto; overflow-x: scroll !important;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: thin; scrollbar-color: #adb5bd #e9ecef;
    }
    .table-responsive::-webkit-scrollbar { height: 10px; width: 10px; }
    .table-responsive::-webkit-scrollbar-track { background: #e9ecef; border-radius: 10px; }
    .table-responsive::-webkit-scrollbar-thumb { background: #adb5bd; border-radius: 10px; border: 2px solid #e9ecef; }
    .table-responsive::-webkit-scrollbar-thumb:hover { background: #6c757d; }

    .table { width: max-content !important; min-width: 100%; border-collapse: separate; border-spacing: 0; }
    .table th, .table td { white-space: nowrap; vertical-align: middle; padding: 0.65rem 1rem; border: 1px solid #dee2e6; }
    .table thead th { position: sticky; top: 0; z-index: 10; background: #f8f9fa; font-weight: 600; color: #495057; border-bottom: 2px solid #dee2e6; }
    .table tbody tr:hover { background-color: #f1f3f5; }

    .kpi-box {
        transition: all 0.3s ease; border: 1px solid #e0e0e0; border-radius: 8px;
        background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .kpi-box:hover { border-color: var(--inventario-accent); box-shadow: 0 4px 12px rgba(46,204,113,0.2); transform: translateY(-2px); }

    .text-costo  { color: #c0392b; font-weight: 600; }
    .text-pvp    { color: #2e7d32; font-weight: 600; }
    .text-valor  { color: #1a5fb4; font-weight: 700; }
    .text-empaque{ color: #7f8c8d; font-weight: 500; }
    .text-dynamic{ color: #6f42c1; font-weight: 500; }

    .inventario-tabs .nav-tabs { border-bottom: 3px solid #27ae60; background: #fff; border-radius: 8px 8px 0 0; overflow: hidden; }
    .inventario-tabs .nav-link { color: #333 !important; font-weight: 600; padding: 0.85rem 1.8rem; background: #f8f9fa; border: 1px solid #dee2e6; border-bottom: none; border-radius: 8px 8px 0 0; margin-right: 4px; }
    .inventario-tabs .nav-link.active { background: var(--inventario-accent); color: white !important; border-color: var(--inventario-accent); font-weight: 700; }
    .inventario-tabs .tab-content { background: white; border: 1px solid #dee2e6; border-top: none; border-radius: 0 0 8px 8px; padding: 1.5rem; min-height: 500px; }

    .chart-container { height: 520px; max-width: 1100px; margin: 0 auto; }

    #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(4px); z-index: 9999; display: none; align-items: center; justify-content: center; }
    .loading-content { text-align: center; background: white; padding: 2.5rem 4rem; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.25); min-width: 320px; }

    /* Tom Select overrides */
    .ts-wrapper.single .ts-control {
        padding: 7px 12px; border: 1px solid #dee2e6; border-radius: 6px;
        font-size: 0.92rem; background: white; cursor: text;
    }
    .ts-wrapper.single.focus .ts-control { border-color: #86b7fe; box-shadow: 0 0 0 3px rgba(13,110,253,0.15); }
    .ts-dropdown { border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); border: 1px solid #dee2e6; font-size: 0.9rem; }
    .ts-dropdown .option { padding: 8px 14px; }
    .ts-dropdown .option:hover, .ts-dropdown .option.active { background: #eff6ff; color: #1d4ed8; }
    .ts-dropdown-content { max-height: 240px; }
    .ts-wrapper { width: 100%; }

    .filtro-carac-col label { font-size: 0.82rem; font-weight: 600; color: #495057; margin-bottom: 4px; display: block; }
</style>

<div class="container-fluid py-3">
    <div class="row mb-4">
        <div class="col-12">
            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body p-4">

                    <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-3">
                        <h4 class="mb-0 panel-title">
                            <i class="bi bi-box-seam me-2"></i>{{ empresa }} | Panel de Inventario
                        </h4>
                    </div>

                    <!-- Fila de filtros principales -->
                    <div class="row g-3 mb-3">
                        <div class="col-md-3 col-sm-6 col-12">
                            <label class="form-label small fw-semibold">Valorizar por</label>
                            <select id="valorizar_a">
                                <option value="costo">Costo</option>
                            </select>
                        </div>
                        <div class="col-md-9 col-sm-12 col-12">
                            <label class="form-label small fw-semibold">
                                <i class="bi bi-search me-1"></i>Búsqueda General
                                <span id="filtro_gral_count" style="display:none; font-size:0.75rem; color:#6c757d; margin-left:6px;"></span>
                            </label>
                            <div style="position:relative;">
                                <input type="text" id="filtro_general"
                                    placeholder="Busca por código, descripción, marca, grupo, proveedor..."
                                    oninput="aplicarFiltroGeneral(this.value)"
                                    style="width:100%; padding:9px 36px 9px 14px; border:1px solid #dee2e6; border-radius:8px; font-size:0.95rem; box-sizing:border-box;">
                                <i class="bi bi-x-lg" id="btn_limpiar_gral"
                                    onclick="limpiarFiltroGeneral()"
                                    style="display:none; position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:#adb5bd; font-size:0.9rem;"></i>
                            </div>
                        </div>
                    </div>

                    <!-- FILTROS DINÁMICOS (clasificaciones) -->
                    <div class="row g-3 mb-3" id="filtros-container" style="display:none;"></div>

                    <!-- Botón limpiar SIEMPRE visible -->
                    <div class="row mb-2">
                        <div class="col-12 d-flex align-items-center gap-3">
                            <button onclick="limpiarTodosFiltros()" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-x-circle me-1"></i>Limpiar filtros
                            </button>
                            <span id="filtros_activos_badge" class="text-muted small"></span>
                        </div>
                    </div>

                    <!-- KPIs -->
                    <div class="row g-3 justify-content-end">
                        <div class="col-md-3 col-sm-6 col-12">
                            <div class="kpi-box text-center p-3">
                                <small class="text-muted d-block fw-medium">Stock Físico</small>
                                <h5 id="t_exi" class="fw-bold text-dark mb-0">0</h5>
                            </div>
                        </div>
                        <div class="col-md-3 col-sm-6 col-12">
                            <div class="kpi-box text-center p-3">
                                <small class="text-muted d-block fw-medium">Artículos</small>
                                <h5 id="t_art" class="fw-bold mb-0">0</h5>
                            </div>
                        </div>
                        <div class="col-md-4 col-sm-6 col-12">
                            <div class="kpi-box text-center p-3 border border-primary">
                                <small class="text-muted d-block fw-medium">Valorización Total</small>
                                <h5 id="t_val" class="fw-bold text-primary mb-0">0,00</h5>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div class="inventario-tabs card shadow-sm border-0 rounded-3 overflow-hidden">
        <ul class="nav nav-tabs mb-0" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabla-pane" type="button">
                    Detalle de Existencias
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#grafico-pane" type="button">
                    Gráfico por Clasificación
                </button>
            </li>
        </ul>
        <div class="tab-content">
            <div class="tab-pane fade show active p-3" id="tabla-pane">
                <div class="table-responsive">
                    <table class="table table-hover table-sm mb-0">
                        <thead class="table-light sticky-top" id="tabla-head"></thead>
                        <tbody id="tabla_inv"></tbody>
                    </table>
                </div>
                <!-- Paginación -->
                <div id="paginacion_inv" class="d-flex align-items-center justify-content-between mt-3 px-1" style="display:none;">
                    <span id="pag_info" class="text-muted small fw-semibold">Página 1 de 1</span>
                    <div class="d-flex align-items-center gap-2">
                        <button id="btn_pag_prev" class="btn btn-sm btn-outline-secondary" disabled>← Anterior</button>
                        <span id="pag_num" class="badge bg-light text-dark border px-3 py-2" style="font-size:0.82rem;"></span>
                        <button id="btn_pag_next" class="btn btn-sm btn-outline-secondary" disabled>Siguiente →</button>
                    </div>
                </div>
            </div>
            <div class="tab-pane fade p-4" id="grafico-pane">
                <h5 class="panel-title mb-4" id="titulo-grafico">Gráfico por Clasificación</h5>
                <div class="chart-container"><canvas id="chartInvMarca"></canvas></div>
            </div>
        </div>
    </div>
</div>

<div id="loadingOverlay">
    <div class="loading-content">
        <div class="spinner-border text-success" role="status"></div>
        <div class="mt-3 fw-bold text-success fs-5">Cargando inventario, por favor espere...</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let chartInstance  = null;
let preciosSync    = false;
let tsValorizar    = null;
let tsProducto     = null;
let tsCaracs       = {};

// ── Paginación ────────────────────────────────────────────────────────────
let paginaActual   = 1;
let totalPaginas   = 1;
let totalRegistros = 0;
const POR_PAGINA   = 100;

const loadingOverlay = document.getElementById('loadingOverlay');
function showLoading() { loadingOverlay.style.display = 'flex'; }
function hideLoading() { loadingOverlay.style.display = 'none'; }

function debounce(fn, delay = 400) {
    let t;
    return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), delay); };
}
const debouncedCargarInv = debounce(() => { paginaActual = 1; cargarInv(); });

// ── Init Tom Selects fijos ────────────────────────────────────────────────
function initTomSelects() {
    tsValorizar = new TomSelect('#valorizar_a', {
        allowEmptyOption: false,
        onChange: () => { paginaActual = 1; cargarInv(); }
    });
    // tsProducto eliminado — se usa Búsqueda General en su lugar
}

// Actualizar opciones de valorizar_a
function actualizarValorizarA(nombresPrecios) {
    if (!tsValorizar) return;
    const actual = tsValorizar.getValue();
    tsValorizar.clearOptions();
    tsValorizar.addOption({ value: 'costo', text: 'Costo' });
    Object.entries(nombresPrecios)
        .sort((a, b) => Number(a[0]) - Number(b[0]))
        .forEach(([key, nombre]) => {
            if (nombre?.trim())
                tsValorizar.addOption({ value: `precio${key}`, text: nombre.trim() });
        });
    tsValorizar.refreshOptions(false);
    tsValorizar.setValue(actual && tsValorizar.options[actual] ? actual : 'costo', true);
}

// poblarSelectProducto — eliminado (se usa Búsqueda General)
function poblarSelectProducto(lista) { /* no-op */ }

// Crear/actualizar Tom Selects dinámicos SIN destruir los que ya existen
function actualizarFiltrosCarac(caracteristicas, filtrosDinamicos) {
    const container = document.getElementById('filtros-container');

    if (!caracteristicas || !Object.keys(caracteristicas).length) {
        // Destruir todos y ocultar
        Object.values(tsCaracs).forEach(ts => ts.destroy());
        tsCaracs = {};
        container.innerHTML = '';
        container.style.display = 'none';
        return;
    }

    container.style.display = 'flex';
    const idxActuales = Object.keys(caracteristicas);

    // Destruir los que ya no existen
    Object.keys(tsCaracs).forEach(idx => {
        if (!idxActuales.includes(idx)) {
            tsCaracs[idx].destroy();
            delete tsCaracs[idx];
            const col = document.getElementById(`col-carac-${idx}`);
            if (col) col.remove();
        }
    });

    // Crear o actualizar cada clasificación
    idxActuales.forEach(idx => {
        const nombre  = caracteristicas[idx];
        const valores = filtrosDinamicos?.[`filtro_carac${idx}`] || [];

        if (!tsCaracs[idx]) {
            // Crear el col y el select
            const col = document.createElement('div');
            col.id        = `col-carac-${idx}`;
            col.className = 'col-md-3 col-sm-6 col-12 filtro-carac-col';
            col.innerHTML = `<label>${nombre}</label><select id="filtro_carac${idx}"><option value="">Todos</option></select>`;
            container.appendChild(col);

            const ts = new TomSelect(`#filtro_carac${idx}`, {
                placeholder: `Buscar ${nombre}...`,
                allowEmptyOption: true,
                maxOptions: 200,
                onChange: () => { paginaActual = 1; cargarInv(); }
            });
            valores.filter(v => v.trim()).forEach(v => ts.addOption({ value: v, text: v }));
            ts.refreshOptions(false);
            tsCaracs[idx] = ts;
        } else {
            // Ya existe — actualizar opciones conservando el valor actual
            const ts     = tsCaracs[idx];
            const actual = ts.getValue();
            ts.clearOptions();
            ts.addOption({ value: '', text: 'Todos' });
            valores.filter(v => v.trim()).forEach(v => ts.addOption({ value: v, text: v }));
            ts.refreshOptions(false);
            // Conservar selección si el valor sigue existiendo
            ts.setValue(actual && valores.includes(actual) ? actual : '', true);
        }
    });
}

// ── Paginación UI ─────────────────────────────────────────────────────────
function renderPaginacion() {
    const cont    = document.getElementById('paginacion_inv');
    const info    = document.getElementById('pag_info');
    const num     = document.getElementById('pag_num');
    const btnPrev = document.getElementById('btn_pag_prev');
    const btnNext = document.getElementById('btn_pag_next');

    if (info) info.textContent = `${totalRegistros.toLocaleString('es-VE')} registros en total`;
    if (num)  num.textContent  = `${paginaActual} / ${totalPaginas}`;
    if (btnPrev) btnPrev.disabled = paginaActual <= 1;
    if (btnNext) btnNext.disabled = paginaActual >= totalPaginas;

    // Mostrar siempre si hay datos, ocultar si no hay nada
    if (cont) cont.style.display = totalRegistros > 0 ? 'flex' : 'none';
}

// ── Limpiar todos los filtros ─────────────────────────────────────────────
function limpiarTodosFiltros() {
    Object.values(tsCaracs).forEach(ts => ts.setValue('', true));
    const inp = document.getElementById('filtro_general');
    if (inp) { inp.value = ''; aplicarFiltroGeneral(''); }
    const badge = document.getElementById('filtros_activos_badge');
    if (badge) badge.textContent = '';
    paginaActual = 1;
    cargarInv();
}

// Actualizar visibilidad del botón limpiar según filtros activos
function actualizarBotonLimpiar() {
    const caracs  = Object.values(tsCaracs).some(ts => ts.getValue() !== '');
    const general = (document.getElementById('filtro_general')?.value || '').trim();
    const badge   = document.getElementById('filtros_activos_badge');
    if (!badge) return;

    const activos = [];
    Object.entries(tsCaracs).forEach(([, ts]) => {
        const v = ts.getValue();
        if (v) activos.push(v);
    });
    if (general) activos.push(`"${general}"`);

    badge.textContent = activos.length ? `Activos: ${activos.join(' · ')}` : '';
}

// ── Función principal ─────────────────────────────────────────────────────
async function cargarInv() {
    showLoading();
    try {
        const params = {
            producto:    '',  // filtrado por búsqueda general en el frontend
            valorizar_a: tsValorizar ? (tsValorizar.getValue()  || 'costo') : 'costo',
            pagina:      paginaActual,
            por_pagina:  POR_PAGINA
        };
        Object.entries(tsCaracs).forEach(([idx, ts]) => {
            const v = ts.getValue();
            if (v) params[`carac${idx}`] = v;
        });

        const resp = await fetch('/api/inventario', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(params)
        });
        if (!resp.ok) throw new Error('Error en API');

        const d = await resp.json();
        const fmt = n => (n || 0).toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        // Paginación
        if (d.paginacion) {
            paginaActual   = d.paginacion.pagina;
            totalPaginas   = d.paginacion.total_paginas;
            totalRegistros = d.paginacion.total_registros;
            renderPaginacion();
        }

        // Actualizar lista de productos conservando selección
        if (d.lista_productos?.length) poblarSelectProducto(d.lista_productos);

        // Actualizar valorizar_a
        if (d.nombres_precios) {
            actualizarValorizarA(d.nombres_precios);

            if (!preciosSync) {
                const head = document.getElementById('tabla-head');
                head.innerHTML = '';
                const cols1 = [
                    { t: 'CÓDIGO',       c: 'ps-3' },
                    { t: 'DESCRIPCIÓN',  c: '' },
                    { t: 'STOCK',        c: 'text-end fw-bold' },
                    { t: 'COSTO UNIT.',  c: 'text-end text-costo' },
                ];
                cols1.forEach(col => {
                    const th = document.createElement('th');
                    th.textContent = col.t; th.className = col.c;
                    head.appendChild(th);
                });
                Object.entries(d.nombres_precios)
                    .sort((a, b) => Number(a[0]) - Number(b[0]))
                    .forEach(([, nombre]) => {
                        if (!nombre?.trim()) return;
                        const th = document.createElement('th');
                        th.className = 'text-end text-pvp';
                        th.textContent = nombre.trim();
                        head.appendChild(th);
                    });
                [
                    { t: 'TOTAL EMPAQUE', c: 'text-end text-empaque' },
                    { t: 'VALOR TOTAL',   c: 'text-end pe-3 text-valor fw-bold', id: 'th-valor-total' },
                ].forEach(col => {
                    const th = document.createElement('th');
                    th.textContent = col.t; th.className = col.c;
                    if (col.id) th.id = col.id;
                    head.appendChild(th);
                });
                if (d.caracteristicas) {
                    Object.entries(d.caracteristicas).forEach(([, nombre]) => {
                        const th = document.createElement('th');
                        th.className = 'text-end text-dynamic small';
                        th.textContent = nombre;
                        head.appendChild(th);
                    });
                }
                preciosSync = true;
            }
        }

        // Filtros dinámicos — sin destruir, conservando valores
        actualizarFiltrosCarac(d.caracteristicas, d.filtros_dinamicos);

        // KPIs
        document.getElementById('t_exi').textContent = Number(d.totales?.existencia || 0).toLocaleString('es-VE');
        document.getElementById('t_art').textContent = Number(d.totales?.articulos  || 0).toLocaleString('es-VE');
        document.getElementById('t_val').textContent = fmt(d.totales?.valor_total   || 0);

        const labelActual = tsValorizar?.getOption(tsValorizar.getValue())?.textContent || 'Costo';
        const thVal = document.getElementById('th-valor-total');
        if (thVal) thVal.textContent = `Valor Total (${labelActual})`;
        const tGraf = document.getElementById('titulo-grafico');
        if (tGraf) tGraf.textContent = `Gráfico por Clasificación (${labelActual})`;

        // Tabla
        const filtroActual = document.getElementById('filtro_general').value;
        const precioKeys = Object.entries(d.nombres_precios || {})
            .filter(([, n]) => n?.trim())
            .sort((a, b) => Number(a[0]) - Number(b[0]))
            .map(([k]) => k);

        document.getElementById('tabla_inv').innerHTML = (d.tabla || []).map(i => {
            let h = '';
            h += `<td class="ps-3 small text-muted fw-bold">${i.CODIGO || '-'}</td>`;
            h += `<td style="font-size:0.85rem;" class="fw-medium">${i.DESCRIPCION || ''}</td>`;
            h += `<td class="text-end fw-bold">${Number(i.EXISTENCIA || 0).toLocaleString('es-VE')}</td>`;
            h += `<td class="text-end text-costo">${fmt(i.COSTO_UNITARIO)}</td>`;
            precioKeys.forEach(k => { h += `<td class="text-end text-pvp">${fmt(i[`PRECIO${k}`])}</td>`; });
            h += `<td class="text-end text-empaque">${fmt(i.TOTAL_EMPAQUE || 0)}</td>`;
            h += `<td class="text-end pe-3 text-valor fw-bold">${fmt(i.VALOR_TOTAL)}</td>`;
            if (d.caracteristicas) {
                Object.keys(d.caracteristicas).forEach(idx => {
                    h += `<td class="text-end small text-dynamic">${i[`CARAC${idx}`] || '-'}</td>`;
                });
            }
            return `<tr>${h}</tr>`;
        }).join('');

        renderInvChart(
            'chartInvMarca',
            d.marcas_chart?.map(x => x.MARCA) || [],
            d.marcas_chart?.map(x => x.V)     || []
        );

        if (filtroActual.trim()) aplicarFiltroGeneral(filtroActual);

    } catch (err) {
        console.error('Error cargando inventario:', err);
    } finally {
        hideLoading();
    }
}

function renderInvChart(id, labels, values) {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    if (chartInstance) chartInstance.destroy();
    const total = values.reduce((s, v) => s + (v || 0), 0);
    chartInstance = new Chart(canvas.getContext('2d'), {
        type: 'doughnut',
        data: {
            labels,
            datasets: [{
                data: values,
                backgroundColor: ['#2ecc71','#27ae60','#1abc9c','#16a085','#3498db','#2980b9','#f1c40f','#e67e22','#e74c3c','#9b59b6'],
                borderWidth: 2, borderColor: '#fff'
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false, cutout: '60%',
            plugins: {
                legend: { position: 'bottom', labels: { font: { size: 12 } } },
                tooltip: {
                    callbacks: {
                        label: ctx => {
                            const pct = total > 0 ? ((ctx.raw / total) * 100).toFixed(1) : 0;
                            const f = ctx.raw.toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                            return `${ctx.label}: ${f} (${pct}%)`;
                        }
                    }
                }
            }
        }
    });
}

document.addEventListener('DOMContentLoaded', () => {
    initTomSelects();
    cargarInv();

    // Botones de paginación
    document.getElementById('btn_pag_prev')?.addEventListener('click', () => {
        if (paginaActual > 1) { paginaActual--; cargarInv(); }
    });
    document.getElementById('btn_pag_next')?.addEventListener('click', () => {
        if (paginaActual < totalPaginas) { paginaActual++; cargarInv(); }
    });
});

// ── Filtro general en tiempo real ─────────────────────────────────────────
function aplicarFiltroGeneral(texto) {
    const btn   = document.getElementById('btn_limpiar_gral');
    const count = document.getElementById('filtro_gral_count');
    btn.style.display = texto ? 'block' : 'none';

    const filtro = texto.trim().toUpperCase();
    const filas  = document.querySelectorAll('#tabla_inv tr');
    let visibles = 0;

    filas.forEach(tr => {
        if (!filtro) { tr.style.display = ''; visibles++; return; }
        const coincide = tr.textContent.toUpperCase().includes(filtro);
        tr.style.display = coincide ? '' : 'none';
        if (coincide) visibles++;
    });

    if (filtro && filas.length > 0) {
        count.textContent = `${visibles} de ${filas.length}`;
        count.style.display = 'inline';
    } else {
        count.style.display = 'none';
    }
}

function limpiarFiltroGeneral() {
    const input = document.getElementById('filtro_general');
    input.value = '';
    aplicarFiltroGeneral('');
    input.focus();
}
</script>
