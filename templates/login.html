<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONFIA | Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #0a0c10;
            --surface:  #111318;
            --border:   rgba(255,255,255,0.08);
            --border-h: rgba(255,255,255,0.16);
            --accent:   #3b82f6;
            --accent-d: #1d4ed8;
            --text:     #f1f5f9;
            --muted:    #64748b;
            --muted-2:  #94a3b8;
            --error:    #f87171;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        /* Grid de puntos de fondo */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
        }

        /* Resplandor central suave */
        body::after {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(59,130,246,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 16px;
        }

        /* ── LOGO ── */
        .logo-area {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: var(--accent);
            margin-bottom: 16px;
            position: relative;
            animation: pulse-ring 2.8s ease-in-out infinite;
        }

        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); }
            50%       { box-shadow: 0 0 0 12px rgba(59,130,246,0); }
        }

        .logo-mark svg {
            width: 34px;
            height: 34px;
            fill: white;
            animation: draw-in 0.8s ease both;
        }

        @keyframes draw-in {
            from { opacity: 0; transform: scale(0.6) rotate(-15deg); }
            to   { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 1.85rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            animation: fade-up 0.6s 0.2s ease both;
        }

        /* Letras individuales con animación escalonada */
        .brand-name span {
            display: inline-block;
            animation: letter-drop 0.5s ease both;
        }
        .brand-name span:nth-child(1) { animation-delay: 0.3s; }
        .brand-name span:nth-child(2) { animation-delay: 0.36s; }
        .brand-name span:nth-child(3) { animation-delay: 0.42s; }
        .brand-name span:nth-child(4) { animation-delay: 0.48s; }
        .brand-name span:nth-child(5) { animation-delay: 0.54s; }
        .brand-name span:nth-child(6) { animation-delay: 0.60s; }

        @keyframes letter-drop {
            from { opacity: 0; transform: translateY(-14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand-tagline {
            font-size: 0.72rem;
            letter-spacing: 2.5px;
            color: var(--muted);
            text-transform: uppercase;
            margin-top: 4px;
            animation: fade-up 0.6s 0.7s ease both;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── CARD ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 32px;
            animation: fade-up 0.6s 0.4s ease both;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }

        .card-sub {
            font-size: 0.83rem;
            color: var(--muted-2);
            margin-bottom: 28px;
        }

        /* ── CAMPOS ── */
        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--muted-2);
            margin-bottom: 7px;
        }

        .field-inner {
            position: relative;
        }

        .field-inner .icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
            display: flex;
        }

        .field input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 14px 11px 40px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.93rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .field input::placeholder { color: var(--muted); }

        .field input:focus {
            border-color: var(--accent);
            background: rgba(59,130,246,0.06);
        }

        .field input:focus + .focus-line {
            width: 100%;
        }

        /* ── BOTÓN ── */
        .btn-submit {
            width: 100%;
            margin-top: 24px;
            padding: 13px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: background 0.2s, transform 0.15s;
        }

        .btn-submit:hover {
            background: var(--accent-d);
            transform: translateY(-1px);
        }

        .btn-submit:active { transform: translateY(0); }

        /* Shimmer en hover */
        .btn-submit::after {
            content: '';
            position: absolute;
            top: -50%; left: -75%;
            width: 50%; height: 200%;
            background: linear-gradient(105deg, transparent, rgba(255,255,255,0.18), transparent);
            transform: skewX(-20deg);
            transition: left 0.5s;
        }
        .btn-submit:hover::after { left: 125%; }

        /* ── ERROR ── */
        .error-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(248,113,113,0.08);
            border: 1px solid rgba(248,113,113,0.2);
            border-radius: 8px;
            padding: 10px 14px;
            margin-top: 16px;
            color: var(--error);
            font-size: 0.84rem;
        }

        /* ── FOOTER ── */
        .footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.72rem;
            color: var(--muted);
            animation: fade-up 0.6s 0.9s ease both;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        .footer strong { color: var(--muted-2); }

        /* Divisor decorativo */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0 0;
        }
        .divider span {
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .divider p {
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Indicador de seguridad */
        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 14px;
        }
        .security-badge svg { color: #22c55e; }

        /* Logo SVG real */
        .logo-svg {
            width: 90px;
            height: 90px;
            margin-bottom: 16px;
            animation: logo-in 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            filter: drop-shadow(0 4px 20px rgba(26,58,107,0.5));
        }

        @keyframes logo-in {
            from { opacity: 0; transform: scale(0.5) rotate(-20deg); }
            to   { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        /* Letras IA — contenedor con efecto matrix */
        .ia-wrapper {
            display: inline-flex;
            gap: 2px;
            position: relative;
        }

        .ia-letter {
            display: inline-block;
            color: #6ab49a;
            position: relative;
            cursor: default;
            transition: color 0.15s;
        }

        /* Canvas matrix detrás del texto IA */
        #ia-canvas {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .ia-wrapper:hover #ia-canvas { opacity: 1; }
        .ia-wrapper:hover .ia-letter { color: #a8d8c0; }

        /* Subrayado animado en las letras IA */
        .ia-letter::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0; right: 0;
            height: 2px;
            background: #6ab49a;
            border-radius: 1px;
            transform: scaleX(0);
            animation: ia-underline 0.4s 1.2s ease forwards;
            transform-origin: left;
        }
        @keyframes ia-underline {
            to { transform: scaleX(1); }
        }

        /* Glitch cada N segundos */
        .ia-letter.glitch {
            animation: ia-glitch 0.3s ease;
        }
        @keyframes ia-glitch {
            0%   { transform: translateX(0) skewX(0deg); color: #6ab49a; }
            20%  { transform: translateX(-3px) skewX(-8deg); color: #4fffb0; }
            40%  { transform: translateX(3px) skewX(8deg); color: #00ff88; }
            60%  { transform: translateX(-2px) skewX(-4deg); color: #6ab49a; }
            80%  { transform: translateX(1px) skewX(2deg); color: #8effc8; }
            100% { transform: translateX(0) skewX(0deg); color: #6ab49a; }
        }
    </style>
</head>
<body>

<div class="wrap">

    <!-- Logo oficial CONFIA -->
    <div class="logo-area">
        <svg class="logo-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <path d="M 151.42,38.72 A 80,80 0 1 0 151.42,161.28 L 129.57,135.24 A 46,46 0 1 1 129.57,64.76 Z" fill="#1a3a6b"/>
            <path d="M 139.85,52.51 A 62,62 0 1 0 139.85,147.49 L 132.14,138.30 A 50,50 0 1 1 132.14,61.70 Z" fill="#6ab49a"/>
        </svg>

        <div class="brand-name">
            <span>C</span><span>O</span><span>N</span><span>F</span><span class="ia-wrapper" id="ia-wrapper">
                    <canvas id="ia-canvas" width="60" height="28"></canvas>
                    <span class="ia-letter" id="ia-i">I</span><span class="ia-letter" id="ia-a">A</span>
                </span>
        </div>
        <div class="brand-tagline">Plataforma de Inteligencia Artificial</div>
    </div>

    <!-- Card de login -->
    <div class="card">
        <div class="card-title">Iniciar sesión</div>
        <div class="card-sub">Ingresa tus credenciales para acceder</div>

        <form method="POST" autocomplete="off">

            <div class="field">
                <label>Empresa</label>
                <div class="field-inner">
                    <span class="icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                        </svg>
                    </span>
                    <input type="text" name="empresa" placeholder="Nombre de tu empresa" required autocomplete="off">
                </div>
            </div>

            <div class="field">
                <label>Correo electrónico</label>
                <div class="field-inner">
                    <span class="icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
                        </svg>
                    </span>
                    <input type="email" name="correo" placeholder="usuario@empresa.com" required>
                </div>
            </div>

            <div class="field">
                <label>Contraseña</label>
                <div class="field-inner">
                    <span class="icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password" name="clave" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">Ingresar</button>

            {% if error %}
            <div class="error-box">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                {{ error }}
            </div>
            {% endif %}

        </form>

        <div class="divider">
            <span></span>
            <p>Acceso seguro</p>
            <span></span>
        </div>

        <div style="text-align:center;">
            <div class="security-badge">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                Conexión cifrada &nbsp;·&nbsp; Sesión protegida
            </div>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 <strong>CONFIA</strong> &nbsp;·&nbsp; Acceso restringido
    </div>

</div>

<script>
// ── Matrix rain en el canvas de las letras IA ────────────────────────────
(function() {
    const canvas  = document.getElementById('ia-canvas');
    const ctx     = canvas.getContext('2d');
    const wrapper = document.getElementById('ia-wrapper');
    const chars   = '01アイウエオカキクケコIAデータ知能人工'.split('');
    const cols    = Math.floor(canvas.width / 8);
    const drops   = Array(cols).fill(0);
    let   animId  = null;

    function drawMatrix() {
        ctx.fillStyle = 'rgba(10,12,16,0.18)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#6ab49a';
        ctx.font = '7px monospace';
        drops.forEach((y, i) => {
            const ch = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillStyle = y < 2 ? '#aaffcc' : '#6ab49a';
            ctx.fillText(ch, i * 8, y * 8);
            if (y * 8 > canvas.height && Math.random() > 0.85) drops[i] = 0;
            else drops[i]++;
        });
        animId = requestAnimationFrame(drawMatrix);
    }

    wrapper.addEventListener('mouseenter', () => {
        if (!animId) drawMatrix();
    });
    wrapper.addEventListener('mouseleave', () => {
        if (animId) { cancelAnimationFrame(animId); animId = null; }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    // ── Glitch periódico ────────────────────────────────────────────────
    const letters = [document.getElementById('ia-i'), document.getElementById('ia-a')];

    function triggerGlitch() {
        letters.forEach(el => {
            el.classList.add('glitch');
            el.addEventListener('animationend', () => el.classList.remove('glitch'), { once: true });
        });
        // Programar el siguiente glitch entre 3 y 7 seg
        setTimeout(triggerGlitch, 3000 + Math.random() * 4000);
    }

    // Primer glitch: 1.5 seg después de cargar
    setTimeout(triggerGlitch, 1500);

    // ── Efecto "construirse" al cargar: scramble → reveal ───────────────
    const CHARS_POOL = '01#@$%&アイIA';
    function scrambleLetter(el, finalChar, duration) {
        const start    = Date.now();
        const interval = setInterval(() => {
            const elapsed = Date.now() - start;
            if (elapsed >= duration) {
                el.textContent = finalChar;
                clearInterval(interval);
            } else {
                el.textContent = CHARS_POOL[Math.floor(Math.random() * CHARS_POOL.length)];
            }
        }, 40);
    }

    setTimeout(() => {
        scrambleLetter(document.getElementById('ia-i'), 'I', 600);
        setTimeout(() => scrambleLetter(document.getElementById('ia-a'), 'A', 600), 120);
    }, 900);
})();
</script>
</body>
</html>
